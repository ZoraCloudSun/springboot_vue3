# 测试环境配置
# 纯单元测试不加载此文件（@ExtendWith(MockitoExtension) 无 Spring 上下文）
# 仅 @WebMvcTest / @SpringBootTest 等切片测试使用

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: embedded
  data:
    redis:
      host: localhost
      port: 6379
  mail:
    host: localhost
    port: 3025
    username: test@test.com
    password: test

jwt:
  secret: test-jwt-secret-key-minimum-256-bits-required-for-hmac-sha256!!
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

wechat:
  app-id: test-app-id
  app-secret: test-app-secret
  callback-url: http://localhost:8080/user/wechat/callback
